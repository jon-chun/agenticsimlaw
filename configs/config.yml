# =============================================================================
# PROBE THRESHOLDS (Paper Section 10)
# =============================================================================
# Thresholds for identifying degenerate/undifferentiated results

probe:
  # Minimum |Outcome Shift| to detect meaningful narrative effect
  # Rationale: Cohen's h=0.20 (small effect) requires ~0.10 probability
  # difference for 80% power at n=20
  min_outcome_shift: 0.10

  # Minimum Rhetorical Advantage Gap to detect narrative privilege
  # Rationale: Detectable difference given within-subject comparison
  min_rhet_adv_gap: 0.05

  # Maximum acceptable RAFR (role-adherence failure rate)
  # Rationale: >25% noncompliance suggests prompt/rubric issues
  max_rafr: 0.25

  # Maximum acceptable variance (SD of decision rate)
  # Rationale: SD>0.15 on binary outcome implies high inconsistency
  max_variance: 0.15

# =============================================================================
# RAFR CONFIGURATION (Paper Section 6.2, Appendix H)
# =============================================================================

rafr:
  # F3: Refusal detection patterns
  refusal_patterns:
    - "I cannot"
    - "I'm unable to"
    - "I can't"
    - "I must decline"
    - "I don't feel comfortable"
    - "As an AI"
    - "I apologize, but I"

  # F2: Require rule citation in responses
  require_rule_citation: true

  # F1: Case-sensitive lexicon matching
  case_sensitive: false

# =============================================================================
# SCHEMA VALIDATION
# =============================================================================

schema:
  strict_no_extra_keys: true
  require_rule_ids_cited: true

# =============================================================================
# ANALYSIS CONFIGURATION
# =============================================================================

analysis:
  # Bootstrap parameters (Paper Section 7.2)
  n_bootstrap: 2000
  bootstrap_alpha: 0.05
  bootstrap_seed: 1337

  # Scenario-to-role mapping (for role-level aggregation)
  scenario_roles:
    A1_late_exam: academic_appeals
    A2_missing_final: academic_appeals
    A3_valid_extension: academic_appeals
    F1_marginal_mortgage: loan_underwriting
    F2_small_business_bridge: loan_underwriting
    F3_solid_refinance: loan_underwriting
    M1_respiratory_scare: medical_triage
    M2_general_malaise: medical_triage
    M3_clear_distress: medical_triage

# =============================================================================
# ABLATION STUDIES (C2 - Temperature Sensitivity)
# =============================================================================
# Small-scale ablation to show effect persists across temperature settings.
# Run after main experiment with: nva ablation --type temperature

ablation:
  temperature:
    enabled: true
    temperatures: [0, 0.3, 0.7]
    # Subset for efficiency: 1 scenario per role × 2 models × 3 temps × n=10
    scenarios: [A1_late_exam, F1_marginal_mortgage, M1_respiratory_scare]
    models:
      - [openai, gpt-5-mini]
      - [anthropic, claude-haiku-4-5]
    n_replicates: 10
    output_dir: "data-ablation"

# =============================================================================
# DEVELOPMENT MODE: PILOT CALIBRATION (Pre-experiment only)
# =============================================================================
# These settings are for calibrating prompts BEFORE running the full experiment.
# This follows ACM FAccT best practices for pilot studies:
# - Pilot data is kept completely separate from main experiment
# - All iterations are documented and versioned
# - Prompts are frozen before production data collection
# - Human-in-the-loop approval required for all changes
#
# Workflow:
# 1. Run: nva pilot (interactive HITL calibration loop)
# 2. Review metrics and recommendations at each iteration
# 3. Accept suggested changes, manually edit, or continue iterating
# 4. When "READY TO FREEZE" appears and metrics meet targets, freeze prompts
# 5. Run: nva run --frozen-confirmed (production experiment)

dev:
  # Pilot calibration settings
  pilot:
    # Set to true during prompt development, false for production runs
    # When true, 'nva run' will refuse to execute (must use 'nva pilot')
    enabled: true

    # Pilot sample size (small for fast iteration, typically 3-5)
    n_replicates: 3

    # Scenarios to pilot (empty = all scenarios)
    # Example: ["A1_late_exam", "F1_marginal_mortgage"]
    scenarios: []

    # Models to use for pilot by ecosystem (subset for efficiency)
    # Each ecosystem uses its designated affective tier for testing
    # Pilot uses 2 models per ecosystem for cross-validation
    models:
      SOTA_US:
        tier: 2                    # Affective tier for US models (mid intensity)
        models: []                 # Commented out for OSS testing
          # - [openai, gpt-5-mini]
          # - [anthropic, claude-haiku-4-5]
      SOTA_CN:
        tier: 2                    # Affective tier for CN models (mid intensity)
        models: []                 # Commented out for OSS testing
          # - [fireworks, "accounts/fireworks/models/glm-4p7"]
          # - [fireworks, "accounts/fireworks/models/deepseek-v3p2"]
      OSS:
        tier: 2                    # Affective tier for OSS models via OpenRouter
        models:
          - [openrouter, "meta-llama/llama-3-8b-instruct"]
          - [openrouter, "qwen/qwq-32b"]
          - [openrouter, "mistralai/mistral-7b-instruct"]

    # Target thresholds for "READY TO FREEZE" determination
    # All scenarios must meet these for certification
    targets:
      min_outcome_shift: 0.15      # |Outcome Shift| >= 0.15 (detectable narrative effect)
      min_rhet_adv_gap: 0.08       # |RhetAdvGap| >= 0.08 (fluency differentiation)
      max_rafr: 0.25               # RAFR <= 0.25 (adequate rule compliance)
      max_variance: 0.20           # SD <= 0.20 (consistent responses)

    # Output directories (kept separate from production data)
    output:
      data_dir: "data-pilot"
      reports_dir: "reports-pilot"

  # Verbose logging during development
  verbose: true

