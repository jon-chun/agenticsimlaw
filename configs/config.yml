# =============================================================================
# Narrative Vulnerability Audit - Configuration
# =============================================================================
# This configuration follows the experimental design in the paper:
# - 6 scenarios (2 per role)
# - 3 affective tiers (0, 2, 4)
# - 2 narrative capitals (high, low)
# - 2 statuses (irrelevant_affect, neutral_length_control)
# - n=20 replicates per cell
# - 8 models (4 SOTA_US + 4 SOTA_CN)
# =============================================================================

run:
  seed: 1337
  n_replicates: 20           # Paper: n=20 per condition cell
  temperature: 0             # Deterministic for reproducibility (C2)
  max_output_tokens: 500
  api_max_retry: 3           # Paper Section 7
  backoff:
    min_seconds: 1.0
    max_seconds: 20.0
    jitter: true

# =============================================================================
# API CALL LIMITS (Pipeline Safety)
# =============================================================================
# Enforce hard limits to prevent runaway API costs during pipeline execution.

api_limits:
  model_max_calls: 4000      # Max calls per individual model
  total_max_calls: 15000     # Max total calls across all models
  checkpoint_interval: 50    # Save state every N cells

paths:
  data_dir: "data"
  data_clean_dir: "data-clean"
  reports_dir: "reports"
  logs_dir: "logs"

# =============================================================================
# EXPERIMENTAL DESIGN (Paper Section 5)
# =============================================================================

experiment:
  # Target paper for outputs (facct2026 or icml2026)
  paper: "facct2026"
  # Experiment tag for output namespacing (oss = open-source models via OpenRouter)
  tag: "oss"

  # All 9 scenarios: 6 negative baseline + 3 positive baseline (Paper §4.2, §4.5)
  scenarios:
    # Negative baselines (facts indicate DENY/WAIT)
    - A1_late_exam
    - A2_missing_final
    - F1_marginal_mortgage
    - F2_small_business_bridge
    - M1_respiratory_scare
    - M2_general_malaise
    # Positive baselines (facts indicate APPROVE/PRIORITIZE) - for bidirectional validation
    - A3_valid_extension
    - F3_solid_refinance
    - M3_clear_distress

  # All 3 affective tiers
  affective_tiers: [0, 2, 4]

  # Both narrative statuses
  statuses:
    - irrelevant_affect
    - neutral_length_control

  # Both narrative capital levels
  narrative_capital:
    - high_fluency
    - low_telegraphic

  # Sanity check configuration (Paper §4.5 - Bidirectional Validation)
  # Uses modified admissible facts that SHOULD flip the decision
  # Runs with BOTH narrative statuses to show models respond to legitimate evidence
  # 6 scenarios × 1 tier × 2 statuses × 2 capital × 20 = 480 calls per model
  sanity_check:
    enabled: true
    scenarios:
      # Negative → Positive direction (DENY→APPROVE)
      - A1_late_exam
      - F1_marginal_mortgage
      - M1_respiratory_scare
      # Positive → Negative direction (APPROVE→DENY)
      - A3_valid_extension
      - F3_solid_refinance
      - M3_clear_distress
    tier: 2
    statuses:                  # BOTH statuses with modified facts
      - irrelevant_affect
      - neutral_length_control
    narrative_capital:
      - high_fluency
      - low_telegraphic

# =============================================================================
# MODEL PANEL (Paper §4.7)
# =============================================================================
# OSS models via OpenRouter.ai for testing

providers:
  provider_model_list:
    # OSS models via OpenRouter.ai
    - [openrouter, "meta-llama/llama-3-8b-instruct"]
    - [openrouter, "qwen/qwq-32b"]
    - [openrouter, "mistralai/mistral-7b-instruct"]
